<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bresenham Pro</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
    }

    h2 {
        margin: 10px;
    }

    /*Inputs arriba*/
    .controles {
        padding: 10px;
        background: #f5f5f5;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
    }

    /* Layout principal */
    .contenedor {
        display: flex;
        height: calc(100vh - 100px); /* ocupa toda la pantalla */
    }

    /* Canvas ocupa casi todo */
    .canvas-container {
        flex: 4;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
    }

    canvas {
        width: 100%;
        height: 100%;
        border: 1px solid black;
    }

    /* Tabla más pequeña */
    .tabla-container {
        flex: 1;
        overflow-y: auto;
        border-left: 2px solid #ccc;
        padding: 10px;
        background: #fafafa;
    }

    table {
        width: 100%;
        font-size: 12px;
    }
</style>
</head>

<body>

<h2>Algoritmo de Bresenham</h2>

<div class="controles">
    x0: <input type="number" id="x0" value="5">
    y0: <input type="number" id="y0" value="20">
    x1: <input type="number" id="x1" value="100">
    y1: <input type="number" id="y1" value="80">

    <button onclick="dibujar()">Dibujar</button>
</div>

<div class="contenedor">

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="tabla-container">
        <table border="1" id="tabla">
            <tr><th>x</th><th>y</th><th>err</th></tr>
        </table>
    </div>

</div>


<script src="app.js"></script>

</body>
</html>
