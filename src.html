<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bresenham Pro</title>

<style>
    body {
        font-family: Arial;
    }

    .contenedor {
        display: flex;
        gap: 20px;
    }

    .canvas-container {
        flex: 3;
    }

    .tabla-container {
        flex: 1;
        max-height: 400px;
        overflow-y: auto;
    }

    canvas {
        border: 1px solid black;
    }

    table {
        width: 100%;
        font-size: 12px;
    }
</style>
</head>

<body>

<h2>Algoritmo de Bresenham</h2>

<label>x0:</label><input type="number" id="x0" value="5">
<label>y0:</label><input type="number" id="y0" value="20">
<label>x1:</label><input type="number" id="x1" value="100">
<label>y1:</label><input type="number" id="y1" value="80">

<button onclick="dibujar()">Dibujar</button>

<div class="contenedor">

    <div class="canvas-container">
        <canvas id="canvas" width="700" height="400"></canvas>
    </div>

    <div class="tabla-container">
        <table border="1" id="tabla">
            <tr><th>x</th><th>y</th><th>err</th></tr>
        </table>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
